<style>
* { box-sizing: border-box; }
body { margin: 0; font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; background: #0f0f14; color: white; display: flex; height: 100vh; overflow: hidden; transition: background 0.4s, color 0.4s; }

::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: #444; border-radius: 4px; }
::-webkit-scrollbar-thumb:hover { background: #00b86b; }

.sidebar { width: 280px; background: #1a1a24; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; transition: background 0.4s; z-index: 10; box-shadow: 2px 0 15px rgba(0,0,0,0.5); }
.sidebar h3 { text-align: center; margin-top: 0; font-size: 22px; text-transform: uppercase; letter-spacing: 1px; color: #00b86b; text-shadow: 0 0 10px rgba(0,184,107,0.3); }

#menuToggle { background: #2b2b3a; border: 1px solid #444; color: white; padding: 12px; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.3s; display: flex; justify-content: space-between; align-items: center; }
#menuToggle:hover { background: #3a3a4d; border-color: #00b86b; }
.settings-menu { display: none; flex-direction: column; gap: 10px; background: #111118; padding: 15px; border-radius: 10px; border: 1px solid #333; margin-top: -5px; }
.settings-menu.open { display: flex; animation: fadeIn 0.3s ease; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }

.main { flex: 1; display: flex; flex-direction: column; min-width: 0; background: transparent; position: relative; height: 100vh; }
.chat { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; scroll-behavior: smooth; }

.msg { padding: 14px 18px; margin: 8px 0; border-radius: 14px; max-width: 85%; white-space: pre-wrap; word-wrap: break-word; position: relative; box-shadow: 0 4px 15px rgba(0,0,0,0.2); line-height: 1.5; font-size: 15px; transition: transform 0.2s ease-out; }
.msg:hover { transform: translateY(-1px); }
.user { background: linear-gradient(135deg, #00b86b, #008f53); margin-left: auto; color: white; border-bottom-right-radius: 4px; }
.ai { background: linear-gradient(135deg, #2b2b3a, #20202d); margin-right: auto; border-bottom-left-radius: 4px; border: 1px solid rgba(255,255,255,0.05); }

.row { display: flex; border-top: 1px solid #222; background: #111; padding: 15px; gap: 10px; z-index: 10; box-shadow: 0 -5px 15px rgba(0,0,0,0.3); }
input, textarea { width: 100%; padding: 14px; border: 1px solid #333; border-radius: 8px; outline: none; background: #16161a; color: white; font-size: 16px; transition: 0.3s; box-shadow: inset 0 2px 5px rgba(0,0,0,0.2); }
input:focus, textarea:focus { border-color: #00b86b; box-shadow: 0 0 10px rgba(0,184,107,0.2); }
button, select { padding: 12px; background: #00b86b; border: none; border-radius: 8px; color: white; cursor: pointer; font-weight: bold; font-size: 15px; transition: 0.3s; outline: none; }
button:hover { background: #009e5b; transform: scale(1.02); }
button:active { transform: scale(0.98); }
select { background: #2b2b3a; width: 100%; color: white; }
select:hover { background: #3a3a4d; }

#voiceBtn { background: #444; border-radius: 8px; }
#voiceBtn.active { background: linear-gradient(135deg, #007bff, #0056b3); box-shadow: 0 0 10px rgba(0,123,255,0.4); }
#adminPanel { display: none; margin-top: 10px; background: #222230; padding: 15px; border-radius: 10px; border: 1px solid #333; }
textarea { height: 120px; resize: none; }

.generators { display: flex; gap: 10px; padding: 12px 15px; background: #1a1a24; border-top: 1px solid #2b2b3a; overflow-x: auto; white-space: nowrap; }
.generators button { background: #2b2b3a; padding: 8px 14px; font-size: 13px; border: 1px solid #444; border-radius: 20px; font-weight: normal; }
.generators button:hover { background: #00b86b; border-color: #00b86b; color: white; }

.copy-btn { position: absolute; top: 8px; right: 8px; background: rgba(0,0,0,0.3); border: none; cursor: pointer; font-size: 14px; padding: 6px; border-radius: 6px; opacity: 0; transition: 0.3s; }
.msg.ai:hover .copy-btn { opacity: 1; }
.copy-btn:hover { background: #00b86b; transform: scale(1.1); }

.loading-dots { display: inline-block; animation: blink 1.4s infinite both; font-weight: bold; font-size: 18px; line-height: 1; }
.loading-dots span { animation: blink 1.4s infinite both; }
.loading-dots span:nth-child(2) { animation-delay: 0.2s; }
.loading-dots span:nth-child(3) { animation-delay: 0.4s; }
@keyframes blink { 0% { opacity: 0.2; } 20% { opacity: 1; } 100% { opacity: 0.2; } }

/* THEMES */
body.theme-hacker { background: #050505; color: #0f0; }
body.theme-hacker .sidebar { background: #000; border-right: 1px solid #0f0; box-shadow: none; }

body.theme-light { background: #f4f4f9; color: #333; }

body.theme-light select { background: #fff; color: #333; border: 1px solid #ccc; }
body.theme-light .row, body.theme-light .generators { background: #fff; border-color: #ddd; }

/* 📱 MOBILE */
@media (max-width: 768px) {

}

let currentLang = "ru";

function changeLanguage() {
    currentLang = document.getElementById("langSelect").value;
    const t = i18n[currentLang];
    
    document.getElementById("txtSettings").innerText = t.settings;
    document.getElementById("thmDefault").innerText = t.thmDefault;
    document.getElementById("thmHacker").innerText = t.thmHacker;
    document.getElementById("thmCyberpunk").innerText = t.thmCyberpunk;
    document.getElementById("thmLight").innerText = t.thmLight;
    
    let voiceBtn = document.getElementById("voiceBtn");
    voiceBtn.innerText = voiceEnabled ? t.voiceOn : t.voiceOff;
    
    document.getElementById("adminPass").placeholder = t.adminPass;
    document.getElementById("txtAdminMode").innerText = t.adminMode;
    document.getElementById("bulk").placeholder = t.adminBulk;
    document.getElementById("txtSaveDb").innerText = t.saveDb;
    
    document.getElementById("gen1").innerText = t.gen1;
    document.getElementById("gen2").innerText = t.gen2;
    document.getElementById("gen3").innerText = t.gen3;
    document.getElementById("gen4").innerText = t.gen4;
    document.getElementById("gen5").innerText = t.gen5;
    
    document.getElementById("btnClear").title = t.clearTitle;
    document.getElementById("input").placeholder = t.inputPlaceholder;
    document.getElementById("btnSend").innerText = t.btnSend;
    
    if (currentLang === "ar") {
        document.body.style.direction = "rtl";
        document.querySelector(".generators").style.flexDirection = "row-reverse";
    } else {
        document.body.style.direction = "ltr";
        document.querySelector(".generators").style.flexDirection = "row";
    }
}

function useGenerator(genId) {
    let text = i18n[currentLang][genId];
    text = text.replace(/[\p{Emoji_Presentation}\p{Extended_Pictographic}]/gu, '').trim();
    document.getElementById("input").value = text;
    send();
}

function clearChat() {
    chat.innerHTML = "";

}

const chat = document.getElementById("chat");
let voiceEnabled = false;

function toggleSettings() {
    let menu = document.getElementById("settingsMenu");
    let btnSpan = document.getElementById("menuArrow");
    if(menu.classList.contains("open")) {
        menu.classList.remove("open");
        btnSpan.innerText = "🔽";
    } else {
        menu.classList.add("open");
        btnSpan.innerText = "🔼";
    }
}

function toggleVoice() {
    voiceEnabled = !voiceEnabled;
    let btn = document.getElementById("voiceBtn");
    if (voiceEnabled) {
        btn.innerText = i18n[currentLang].voiceOn;
        btn.classList.add("active");
    } else {
        btn.innerText = i18n[currentLang].voiceOff;
        btn.classList.remove("active");
        window.speechSynthesis.cancel();
    }
}

function speakText(text) {
    if (!voiceEnabled) return;
    window.speechSynthesis.cancel(); 
    let cleanText = text.replace(/[\p{Emoji_Presentation}\p{Extended_Pictographic}📋✅⚛️📜🔥💻🛋️🤖👨‍🏫😎✨]/gu, '').replace(/[#*`~_\-()]/g, ' ');
    let speech = new SpeechSynthesisUtterance(cleanText);
    
    if (currentLang === 'kk') speech.lang = 'kk-KZ';
    else if (currentLang === 'en') speech.lang = 'en-US';
    else if (currentLang === 'de') speech.lang = 'de-DE';
    else if (currentLang === 'ar') speech.lang = 'ar-SA';
    else speech.lang = 'ru-RU';
    
    window.speechSynthesis.speak(speech);
}

let loadingIndicator = null;
function showLoading() {
    if(loadingIndicator) return;
    loadingIndicator = document.createElement("div");
    loadingIndicator.className = "msg ai";
    loadingIndicator.innerHTML = `${i18n[currentLang].loadingText} <span class="loading-dots"><span>.</span><span>.</span><span>.</span></span> 🧠`;
    chat.appendChild(loadingIndicator);
    chat.scrollTop = chat.scrollHeight;
}
function hideLoading() {
    if (loadingIndicator && chat.contains(loadingIndicator)) {
        chat.removeChild(loadingIndicator);
        loadingIndicator = null;
    }
}

function add(text, type, instant = false){
    let div = document.createElement("div");
    div.className = "msg " + type;
    let textSpan = document.createElement("span");
    div.appendChild(textSpan);

    if (type === "ai") {
        let copyBtn = document.createElement("button");
        copyBtn.innerText = "📋";
        copyBtn.className = "copy-btn";
        copyBtn.onclick = function() {
            navigator.clipboard.writeText(text);
            copyBtn.innerText = "✅";
            setTimeout(() => { copyBtn.innerText = "📋"; }, 2000);
        };
        div.appendChild(copyBtn);
        chat.appendChild(div);

        if (!instant) {
            let chars = [...text];
            let i = 0;
            let timer = setInterval(() => {
                if (i < chars.length) {
                    textSpan.innerText += chars.slice(i, i + 4).join('');
                    i += 4;
                    chat.scrollTop = chat.scrollHeight;
                } else {
                    clearInterval(timer);
                    if (text.length < 500) speakText(text);
                }
            }, 12);
        } else {
            textSpan.innerText = text;
            if (text.length < 500) speakText(text);
        }
    } else {
        textSpan.innerText = text;
        chat.appendChild(div);
    }
    chat.scrollTop = chat.scrollHeight;
    return div; 
}

if(chat.children.length === 0) { add(i18n["ru"].welcome, "ai", false); }

function brain(text) {
    let q = text.toLowerCase().trim().replace(/\s+/g, ""); 
    for (let key in memory) {
        if (q === key.toLowerCase().replace(/\s+/g, "")) return memory[key];
    }
    return null;
}

function checkAdmin() {
    document.getElementById("adminPanel").style.display = (document.getElementById("adminPass").value === "nurik777") ? "block" : "none";
}

function bulkLearn() {
    let text = document.getElementById("bulk").value;
    let lines = text.split("\n");
    for(let line of lines){
        if(line.includes(" это ")){
            let parts = line.split(" это ");
            memory[parts[0].trim().toLowerCase()] = parts.slice(1).join(" это ").trim();
        }
    }
    if (db) db.ref('serik_memory').set(memory);
    document.getElementById("bulk").value = "";
}

function changeTheme() { document.body.className = "theme-" + document.getElementById("themeSelect").value; }

async function askSmartAI(queryText) {
    chatHistory.push({ role: "user", content: queryText });
    if (chatHistory.length > 10) chatHistory.shift();

    let langMap = { "ru": "русский", "kk": "казахский", "en": "английский", "de": "немецкий", "ar": "арабский" };
    let aiLang = langMap[currentLang];

    if (queryText.length < 15) {
        try {
            let context = chatHistory.map(h => `${h.role}: ${h.content}`).join("\n");
            let quickPrompt = `System: ${currentSystemPrompt}\nLanguage: ${aiLang}\nContext:\n${context}\n\nRespond naturally and short in ${aiLang}.`;
            let res = await fetch(`https://text.pollinations.ai/${encodeURIComponent(quickPrompt)}?model=openai`);
            let text = await res.text();
            if (text) { chatHistory.push({ role: "assistant", content: text.trim() }); return text.trim(); }
        } catch (e) {}
    }

    let fullPrompt = `System: ${currentSystemPrompt}\nLanguage: ${aiLang}\nTask: Answer strictly in ${aiLang} language.\nUser: ${queryText}`;
    
    let answers = await Promise.allSettled([
        fetch(`https://text.pollinations.ai/${encodeURIComponent(fullPrompt)}?model=openai`).then(r => r.text()),
        fetch(`https://text.pollinations.ai/${encodeURIComponent(fullPrompt)}?model=mistral`).then(r => r.text())
    ]);

    let valid = answers.filter(a => a.status === "fulfilled" && a.value && !a.value.includes("not found")).map((a, i) => `[Model ${i}]:\n${a.value.trim()}`);
    
    if (valid.length === 0) return i18n[currentLang].error;

    let synthPrompt = `Synthesize these answers into one perfect response strictly in ${aiLang}.\n\n${valid.join("\n\n")}`;
    try {
        let finalRes = await fetch(`https://text.pollinations.ai/${encodeURIComponent(synthPrompt)}?model=openai`);
        let finalContent = await finalRes.text();
        if (finalContent) { chatHistory.push({ role: "assistant", content: finalContent.trim() }); return finalContent.trim(); }
    } catch (e) {}

    let fallback = valid[0].split("]:\n")[1] || valid[0];
    chatHistory.push({ role: "assistant", content: fallback.trim() });
    return fallback.trim();
}

async function send() {
    let inputEl = document.getElementById("input");
    let text = inputEl.value.trim();
    if (!text) return;
    add(text, "user");
    inputEl.value = "";

    let res = brain(text);
    if(res){
        showLoading();
        setTimeout(() => { hideLoading(); add(res, "ai"); }, 400);
        return;
    }

    showLoading();
    let finalAnswer = await askSmartAI(text);
    hideLoading();
    add(finalAnswer, "ai");
}
