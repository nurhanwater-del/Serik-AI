function levenshteinDistance(a, b) {
    if (a.length === 0) return b.length;
    if (b.length === 0) return a.length;
    let matrix = [];
    for (let i = 0; i <= b.length; i++) { matrix[i] = [i]; }
    for (let j = 0; j <= a.length; j++) { matrix[0][j] = j; }
    for (let i = 1; i <= b.length; i++) {
        for (let j = 1; j <= a.length; j++) {
            if (b.charAt(i - 1) === a.charAt(j - 1)) {
                matrix[i][j] = matrix[i - 1][j - 1];
            } else {
                matrix[i][j] = Math.min(
                    matrix[i - 1][j - 1] + 1, 
                    Math.min(matrix[i][j - 1] + 1, 
                    matrix[i - 1][j] + 1) 
                );
            }
        }
    }
    return matrix[b.length][a.length];
}

function brain(text) {
    let q = text.toLowerCase().trim();
    let qNoSpace = q.replace(/\s+/g, ""); 
    
    if(memory[q]) return memory[q];

    let bestMatch = null;
    let minDistance = 3; 

    for (let key in memory) {
        let keyNoSpace = key.toLowerCase().replace(/\s+/g, "");
        
        if (qNoSpace === keyNoSpace) {
            return memory[key];
        }

        let dist = levenshteinDistance(q, key.toLowerCase());
        if (dist < minDistance) {
            minDistance = dist;
            bestMatch = key;
        }
    }
    if (bestMatch) return memory[bestMatch];
    return null;
}

    let text = document.getElementById("bulk").value;
    let lines = text.split("\n");
    let count = 0;
    let newMemory = Object.assign({}, memory);

    for(let line of lines){
        line = line.trim();
        if(!line.includes(" это ")) continue;
        let parts = line.split(" это ");
        let q = parts[0].trim().toLowerCase();
        let a = parts.slice(1).join(" это ").trim();
        if(q && a){ newMemory[q] = a; count++; }
    }
    
    if (count > 0) {
        memory = newMemory;
        if (db) {
            db.ref('serik_memory').set(memory);
            alert("✅ Успешно сохранено в облаке Firebase!");
        }
    }
    document.getElementById("bulk").value = "";
}

function changeTheme() {
    let theme = document.getElementById("themeSelect").value;
    document.body.className = "theme-" + theme;
}

function generateText(prompt) {
    document.getElementById("input").value = prompt;
    send();
}

// --- ПОИСК В ВЕБЕ (WIKIPEDIA API С ФИЛЬТРОМ КОНТЕКСТА) ---
async function searchWebFallback(queryText) {
    try {
        let cleanQuery = queryText.replace(/(пожалуйста|расскажи про|что такое|кто такой|найди|гугл|google|реферат|эссе|кратко|кім ол|не ол)/gi, "").trim();
        let searchUrl = `https://ru.wikipedia.org/w/api.php?action=query&list=search&srsearch=${encodeURIComponent(cleanQuery)}&format=json&origin=*`;
        let res = await fetch(searchUrl);
        let data = await res.json();
        
        if (data.query.search.length > 0) {
            let title = data.query.search[0].title;
            let contentUrl = `https://ru.wikipedia.org/w/api.php?action=query&prop=extracts&exintro=0&explaintext=1&titles=${encodeURIComponent(title)}&format=json&origin=*`;
            let contentRes = await fetch(contentUrl);
            let contentData = await contentRes.json();
            let pages = contentData.query.pages;
            let extract = pages[Object.keys(pages)[0]].extract;
            
            if (extract && extract.trim().length > 30) {
                if(queryText.toLowerCase().includes("кратко")) {
                    return `🤖 [Smart Web Search]: ${extract.split(/(?<=[.!?])\s+/).slice(0, 2).join(" ")}`;
                }
                return `[Smart Web Search - ${title}]: ${extract.substring(0, 1800)}`;
            }
        }
        return null;
    } catch(e) { return null; }
}

// --- СМАРТ ИИ С ЗАЩИТОЙ ОТ ПЕРЕГРУЗОК (POST-МЕТОД) ---
async function askSmartAI(queryText) {
    chatHistory.push({ role: "user", content: queryText });
    if (chatHistory.length > 10) chatHistory.shift();

    let textLower = queryText.toLowerCase().trim();

    // Заглушка приветствий (на русском)
    const shortPhrases = ["салем", "сәлем", "привет", "hi", "hello", "калайсын", "қалайсың", "как дела"];
    if (shortPhrases.some(phrase => textLower === phrase || textLower.startsWith(phrase + " "))) {
        let helloAnswer = "Привет! Как дела? Чем могу помочь? 😊";
        chatHistory.push({ role: "assistant", content: helloAnswer });
        return helloAnswer;
    }

    // Жесткий фильтр веб-поиска (срабатывает только на конкретные поисковые триггеры)
    let webContext = "";
    if (textLower.startsWith("что такое") || textLower.startsWith("кто такой") || textLower.startsWith("кім ол") || textLower.startsWith("не ол") || textLower.startsWith("найди")) {
        try {
            let searchData = await searchWebFallback(queryText);
            if (searchData && searchData.length > 10) {
                webContext = `\n\n[Found Web Search Information]:\n${searchData}`;
            }
        } catch (e) {
            console.log("Ошибка веб-поиска:", e);
        }
    }

    let finalSystemInstruction = `${currentSystemPrompt}${webContext}`;

    let apiMessages = [
        { role: "system", content: finalSystemInstruction },
        ...chatHistory
    ];

    let models = ["openai", "mistral", "llama"]; 
    
    for (let model of models) {
        try {
            let res = await fetch("https://text.pollinations.ai/", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    messages: apiMessages,
                    model: model,
                    private: true
                })
            });

            let text = await res.text();
            
            if (text && text.length > 1 && !text.includes('"error"') && !text.includes('Queue full')) {
                let aiResponse = text.trim();
                chatHistory.push({ role: "assistant", content: aiResponse });
                return aiResponse;
            }
        } catch (e) {
            console.error(`Ошибка модели ${model}, переключаюсь на следующую...`, e);
        }
    }

        if (webContext) {
        return `🌐 [Сервер перегружен, но найдено в Википедии]: ${webContext.replace('\n\n[Found Web Search Information]:\n', '')}`;
    }

    return "Извини, на сервере высокая нагрузка. Пожалуйста, отправь свой вопрос еще раз! 🔄";
}

// --- АСИНХРОННАЯ ФУНКЦИЯ ОТПРАВКИ ---
async function send() {
    let input = document.getElementById("input");
    let text = input.value.trim();
    if (!text) return;
    
    add(text, "user");
    input.value = "";

    // --- 1. МАТЕМАТИКА ---
    if (/^[0-9\s\+\-\*\/\(\)\.]+$/.test(text)) {
        showLoading();
        try {
            let mathResult = eval(text);
            setTimeout(() => { 
                hideLoading();
                add(`🧮 Ответ: ${mathResult}`, "ai");
            }, 700);
            return;
        } catch(e) { }
    }

    // --- 2. ЛОКАЛЬНАЯ БАЗА ЗНАНИЙ (Brain) ---
    let res = brain(text);
    if (res) {
        showLoading();
        setTimeout(() => { 
            hideLoading();
            add(res, "ai");
        }, 400);
        return;
    }

    let lowerText = text.toLowerCase();

    // --- 3. АНАЛИЗ ИЗОБРАЖЕНИЙ (Vision) ---
    let imgUrlMatch = text.match(/https?:\/\/\S+\.(?:png|jpg|jpeg|webp|gif)/i);
    if (imgUrlMatch) {
        showLoading();
        let detectedImageUrl = imgUrlMatch[0];
        let cleanQuestion = text.replace(detectedImageUrl, "").trim() || "Что на этом изображении?";
        
        try {
            let visionUrl = `https://text.pollinations.ai/${encodeURIComponent(cleanQuestion)}?image=${encodeURIComponent(detectedImageUrl)}&model=openai`;
            let res = await fetch(visionUrl);
            let responseText = await res.text();
            
            hideLoading();
            add(`👁️ [Анализ изображения]:\n\n${responseText.trim()}`, "ai");
            return;
        } catch(e) {
            console.error("Ошибка Vision API:", e);
        }
    }

                // --- 4. ФОТОГЕНЕРАТОР (МАШИНАНЫ ИНТЕРНЕТТЕН ІЗДЕЙДІ, ҚАЛҒАНЫН ИИ ӨЗІ САЛАДЫ) ---
    if (lowerText.includes("нарисуй") || lowerText.includes("сурет сал") || lowerText.includes("сгенерируй")) {
        showLoading();
        
        let userPrompt = text.replace(/(нарисуй|сурет сал|сгенерируй)/gi, "").trim();
        
        // Машинаға қатысты сөздер бар-жоғын тексереміз
        let isCar = /машина|көлік|авто|car|джип|bmw|мерс|мерседес|ауди|тойота|камри|лексус|порше/i.test(userPrompt.toLowerCase());

        if (isCar) {
            // 1. МАШИНА БОЛСА: ИНТЕРНЕТТЕН НАҒЫЗ ФОТО ІЗДЕЙМІЗ (Википедияның ашық базасы арқылы)
            async function fetchRealCarPhoto(query) {
                try {
                    let searchUrl = `https://ru.wikipedia.org/w/api.php?action=query&list=search&srsearch=${encodeURIComponent(query)}&format=json&origin=*`;
                    let res = await fetch(searchUrl);
                    let data = await res.json();
                    
                    if(data.query.search.length > 0) {
                        let title = data.query.search[0].title;
                        // Мақаланың басты суретін жоғары сапада (1000px) аламыз
                        let imgUrl = `https://ru.wikipedia.org/w/api.php?action=query&prop=pageimages&titles=${encodeURIComponent(title)}&pithumbsize=1000&format=json&origin=*`;
                        let imgRes = await fetch(imgUrl);
                        let imgData = await imgRes.json();
                        let pages = imgData.query.pages;
                        let pageId = Object.keys(pages)[0];
                        
                        if(pages[pageId].thumbnail && pages[pageId].thumbnail.source) {
                            return pages[pageId].thumbnail.source;
                        }
                    }
                    return null;
                } catch(e) { return null; }
            }

            fetchRealCarPhoto(userPrompt).then(realImageUrl => {
                if(realImageUrl) {
                    hideLoading();
                    let img = document.createElement("img");
                    img.style.width = "100%";
                    img.style.borderRadius = "10px";
                    img.style.marginTop = "10px";
                    img.onload = () => { chat.scrollTop = chat.scrollHeight; };
                    img.src = realImageUrl;
                    
                    let div = add("🔍 Міне, интернеттен табылған нағыз көліктің фотосы:", "ai", true);
                    div.appendChild(img);
                } else {
                    // Егер интернеттен нақты бұл машина табылмаса, запасной вариант ретінде ИИ реалистичный қылып салып береді
                    generateAIImage(userPrompt, true);
                }
            });
            return; // Код осында тоқтайды, өйткені интернеттен іздеп жатыр
            
        } else {
            // 2. БАСҚА ТАҚЫРЫП БОЛСА: ИИ ӨЗІ САЛАДЫ
            generateAIImage(userPrompt, false);
            return;
        }

        // ИИ арқылы сурет салатын көмекші функция (қалған тақырыптар үшін)
        function generateAIImage(promptText, isFallbackCar) {
            // Егер интернеттен табылмаған машина болса реалистичный промпт, ал басқа тақырып болса арт промпт
            let enhancedPrompt = isFallbackCar 
                ? `A real photograph of ${promptText}, high-end automotive photography, 8k resolution, highly detailed, purely photorealistic, true to life`
                : `Masterpiece, brilliant high-quality creation of ${promptText}, ultra-detailed, 8k resolution, perfect proportions, beautiful artwork, stunning visuals`;
            
            let randomSeed = Math.floor(Math.random() * 999999999) + Date.now();
            let imageUrl = `https://image.pollinations.ai/prompt/${encodeURIComponent(enhancedPrompt)}?width=1024&height=1024&nologo=true&seed=${randomSeed}&model=flux`;
            
            let img = document.createElement("img");
            img.style.width = "100%";
            img.style.borderRadius = "10px";
            img.style.marginTop = "10px";
            
            img.onload = function() {
                hideLoading();
                let msgText = isFallbackCar 
                    ? "⚠️ Интернеттен фото табылмады, бірақ мен өзім дәл сондай шынайы етіп салып бердім:" 
                    : "🎨 Міне, сен сұраған жоғары сападағы сурет:";
                let div = add(msgText, "ai", true);
                div.appendChild(img);
                chat.scrollTop = chat.scrollHeight;
            };
            
            img.onerror = function() {
                hideLoading();
                add("❌ Кешіріңіз, серверден сурет жүктелмеді.", "ai", true);
            };
            img.src = imageUrl;
        }
    }


    // --- 5. ЗАПРОС К КЛАССИЧЕСКОМУ ИИ ---
    showLoading();
    try {
        let finalAnswer = await askSmartAI(text); 
        hideLoading();
        add(finalAnswer, "ai");
    } catch (error) {
        hideLoading();
        console.error("Ошибка отправки:", error);
        add("Извините, произошла ошибка сервера. Пожалуйста, попробуйте повторить запрос чуть позже ⚠️", "ai");
    }
}
</script>
