<!DOCTYPE html>
<html lang="kk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Serik AI</title>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<style>
* { box-sizing: border-box; }
body { margin: 0; font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; background: #0f0f14; color: white; display: flex; height: 100vh; overflow: hidden; transition: background 0.4s, color 0.4s; }

::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: #444; border-radius: 4px; }
::-webkit-scrollbar-thumb:hover { background: #00b86b; }

.sidebar { width: 280px; background: #1a1a24; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; transition: background 0.4s; z-index: 10; box-shadow: 2px 0 15px rgba(0,0,0,0.5); }
.sidebar h3 { text-align: center; margin-top: 0; font-size: 22px; text-transform: uppercase; letter-spacing: 1px; color: #00b86b; text-shadow: 0 0 10px rgba(0,184,107,0.3); }

#menuToggle { background: #2b2b3a; border: 1px solid #444; color: white; padding: 12px; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.3s; display: flex; justify-content: space-between; align-items: center; }
#menuToggle:hover { background: #3a3a4d; border-color: #00b86b; }
.settings-menu { display: none; flex-direction: column; gap: 10px; background: #111118; padding: 15px; border-radius: 10px; border: 1px solid #333; margin-top: -5px; }
.settings-menu.open { display: flex; animation: fadeIn 0.3s ease; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }

.main { flex: 1; display: flex; flex-direction: column; min-width: 0; background: transparent; position: relative; height: 100vh; }
.chat { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; scroll-behavior: smooth; }

.msg { padding: 14px 18px; margin: 8px 0; border-radius: 14px; max-width: 85%; white-space: pre-wrap; word-wrap: break-word; position: relative; box-shadow: 0 4px 15px rgba(0,0,0,0.2); line-height: 1.5; font-size: 15px; transition: transform 0.2s ease-out; }
.msg:hover { transform: translateY(-1px); }
.user { background: linear-gradient(135deg, #00b86b, #008f53); margin-left: auto; color: white; border-bottom-right-radius: 4px; }
.ai { background: linear-gradient(135deg, #2b2b3a, #20202d); margin-right: auto; border-bottom-left-radius: 4px; border: 1px solid rgba(255,255,255,0.05); }

.row { display: flex; flex-direction: column; border-top: 1px solid #222; background: #111; padding: 15px; gap: 10px; z-index: 10; box-shadow: 0 -5px 15px rgba(0,0,0,0.3); }
.input-group { display: flex; gap: 10px; width: 100%; }

input, textarea { width: 100%; padding: 14px; border: 1px solid #333; border-radius: 8px; outline: none; background: #16161a; color: white; font-size: 16px; transition: 0.3s; box-shadow: inset 0 2px 5px rgba(0,0,0,0.2); }
input:focus, textarea:focus { border-color: #00b86b; box-shadow: 0 0 10px rgba(0,184,107,0.2); }
button, select { padding: 12px; background: #00b86b; border: none; border-radius: 8px; color: white; cursor: pointer; font-weight: bold; font-size: 15px; transition: 0.3s; outline: none; }
button:hover { background: #009e5b; transform: scale(1.02); }
button:active { transform: scale(0.98); }
select { background: #2b2b3a; width: 100%; color: white; }

#voiceBtn { background: #444; border-radius: 8px; }
#voiceBtn.active { background: linear-gradient(135deg, #007bff, #0056b3); box-shadow: 0 0 10px rgba(0,123,255,0.4); }
#adminPanel { display: none; margin-top: 10px; background: #222230; padding: 15px; border-radius: 10px; border: 1px solid #333; }
textarea { height: 120px; resize: none; }

.generators { display: flex; gap: 10px; padding: 12px 15px; background: #1a1a24; border-top: 1px solid #2b2b3a; overflow-x: auto; white-space: nowrap; }
.generators button { background: #2b2b3a; padding: 8px 14px; font-size: 13px; border: 1px solid #444; border-radius: 20px; font-weight: normal; }
.generators button:hover { background: #00b86b; border-color: #00b86b; color: white; }

.copy-btn { position: absolute; top: 8px; right: 8px; background: rgba(0,0,0,0.3); border: none; cursor: pointer; font-size: 14px; padding: 6px; border-radius: 6px; opacity: 0; transition: 0.3s; }
.msg.ai:hover .copy-btn { opacity: 1; }
.copy-btn:hover { background: #00b86b; transform: scale(1.1); }

.disclaimer { text-align: center; font-size: 11px; color: #777; width: 100%; font-family: sans-serif; letter-spacing: 0.5px; margin-top: 2px; }

.loading-dots { display: inline-block; animation: blink 1.4s infinite both; font-weight: bold; font-size: 18px; line-height: 1; }
.loading-dots span { animation: blink 1.4s infinite both; }
.loading-dots span:nth-child(2) { animation-delay: 0.2s; }
.loading-dots span:nth-child(3) { animation-delay: 0.4s; }
@keyframes blink { 0% { opacity: 0.2; } 20% { opacity: 1; } 100% { opacity: 0.2; } }

body.theme-hacker { background: #050505; color: #0f0; }
body.theme-hacker .sidebar { background: #000; border-right: 1px solid #0f0; }
body.theme-hacker .msg.ai { background: #0a0a0a; border: 1px solid #0f0; color: #0f0; }
body.theme-hacker .msg.user { background: #003300; border: 1px solid #0f0; color: #0f0; }
body.theme-hacker button, body.theme-hacker select, body.theme-hacker #menuToggle { background: #002200; border: 1px solid #0f0; color: #0f0; }

body.theme-cyberpunk { background: #0f001a; color: #0ff; }
body.theme-cyberpunk .sidebar { background: #1a0033; border-right: 1px solid #f0f; }
body.theme-cyberpunk .msg.ai { background: #2a004d; border: 1px solid #0ff; color: #fff; }
body.theme-cyberpunk .msg.user { background: #4d004d; border: 1px solid #f0f; color: #fff; }

body.theme-light { background: #f4f4f9; color: #333; }
body.theme-light .sidebar { background: #ffffff; border-right: 1px solid #ddd; }
body.theme-light .msg.ai { background: #ffffff; color: #333; border: 1px solid #e0e0e0; }
body.theme-light .msg.user { background: linear-gradient(135deg, #00b86b, #009e5b); color: #fff; }

@media (max-width: 768px) {
    body { flex-direction: column; height: 100vh; overflow: hidden; position: fixed; width: 100%; }
    .sidebar { width: 100%; height: auto; max-height: 120px; padding: 8px 12px; gap: 4px; }
    .main { flex: 1; height: calc(100vh - 120px); display: flex; flex-direction: column; position: relative; }
    .chat { flex: 1; padding: 10px; padding-bottom: 90px; }
    .row { position: fixed; bottom: 0; left: 0; width: 100%; background: #111; padding: 10px; }
}
</style>
</head>

<body class="theme-default">

<div class="sidebar">
    <h3>🤖 Serik AI</h3>
    
    <button id="menuToggle" onclick="toggleSettings()">⚙️ Баптаулар <span>🔽</span></button>
    
    <div id="settingsMenu" class="settings-menu">
        <select id="themeSelect" onchange="changeTheme()">
            <option value="default">🌙 Қараңғы</option>
            <option value="hacker">💻 Хакер (Matrix)</option>
            <option value="cyberpunk">🌃 Киберпанк</option>
            <option value="light">☀️ Жарық</option>
        </select>

        <button id="voiceBtn" onclick="toggleVoice()">🔇 Дауыс: ӨШІРУЛІ</button>
        <input type="password" id="adminPass" placeholder="Админ паролі" oninput="checkAdmin()">
        
        <div id="adminPanel">
            <p style="color: #00b86b; margin: 0 0 5px 0; font-weight: bold; text-align: center;">🔒 ADMIN MODE</p>
            <textarea id="bulk" placeholder="сұрақ это жауап"></textarea>
            <button onclick="bulkLearn()" style="width: 100%; margin-top: 5px;">Базаға сақтау</button>
        </div>
    </div>
</div>

<div class="main">
    <div class="chat" id="chat"></div>
    
    <div class="generators">
        <button onclick="generateText('Амандасып, жағдай сұрасшы брат')">💬 Әңгімелесу</button>
        <button onclick="generateText('Қазіргі соңғы жаңалықтарды айтып бер')">🌐 Соңғы жаңалықтар</button>
        <button onclick="generateText('С++ тілінде ойын жазу неден басталады?')">💻 C++ Ойын дамыту</button>
        <button onclick="generateText('Godot движогында 3D ойын жасау бойынша кеңес бер')">🎮 Godot Engine</button>
        <button onclick="generateText('Маған мықты мотивация берші')">🔥 Мотивация</button>
    </div>

    <div class="row">
        <div class="input-group">
            <button onclick="clearChat()" style="background: #ff4d4d; min-width: 50px;" title="Тазалау">🗑️</button>
            <input id="input" placeholder="Сұрағыңызды немесе ойыңызды жазыңыз..." onkeydown="if(event.key==='Enter') send()">
            <button onclick="send()">Жіберу</button>
        </div>
        <div class="disclaimer">Serik AI — Llama өзегіне негізделген ақылды жүйе.</div>
    </div>
</div>

<script>
let chatHistory = [];

const firebaseConfig = {
  apiKey: "AIzaSyAzofVJLZNadLA1-1XsCSqCukJ4gkPzqoo",
  authDomain: "serik-ai.firebaseapp.com",
  databaseURL: "https://serik-ai-default-rtdb.firebaseio.com",
  projectId: "serik-ai"
};

const defaultMemory = {
    "привет": "Сәлем, брат! Мен дайынмын. Қандай сұрағың бар? 👋",
    "сәлем": "Сәлем, бауырым! Қалайсың? Жұмыстар қалай? 👋",
    "как тебя зовут": "Мен Serik AI жүйесімін. 🤖",
    "неге серік": "Серік AI атауы — автордың әкесіне деген шексіз құрметі мен махаббатының белгісі."
};

let memory = Object.assign({}, defaultMemory);
let db = null;

if (firebaseConfig.apiKey) {
    firebase.initializeApp(firebaseConfig);
    db = firebase.database();
    db.ref('serik_memory').on('value', (snapshot) => {
        const cloudData = snapshot.val();
        if (cloudData) { memory = Object.assign({}, defaultMemory, cloudData); }
    });
}

const chat = document.getElementById("chat");
let voiceEnabled = false;

function toggleSettings() {
    let menu = document.getElementById("settingsMenu");
    let btnSpan = document.querySelector("#menuToggle span");
    if(menu.classList.contains("open")) {
        menu.classList.remove("open");
        btnSpan.innerText = "🔽";
    } else {
        menu.classList.add("open");
        btnSpan.innerText = "🔼";
    }
}

function toggleVoice() {
    voiceEnabled = !voiceEnabled;
    let btn = document.getElementById("voiceBtn");
    if (voiceEnabled) {
        btn.innerText = "🔊 Дауыс: ҚОСУЛЫ";
        btn.classList.add("active");
    } else {
        btn.innerText = "🔇 Дауыс: ӨШІРУЛІ";
        btn.classList.remove("active");
        window.speechSynthesis.cancel();
    }
}

function speakText(text) {
    if (!voiceEnabled) return;
    window.speechSynthesis.cancel(); 
    let cleanText = text.replace(/[\p{Emoji_Presentation}\p{Extended_Pictographic}📋✅⚛️📜🔥💻🤖😎✨]/gu, '').replace(/[#*`~_\-()]/g, ' ');
    let speech = new SpeechSynthesisUtterance(cleanText);
    speech.lang = /[әғқңөұүһіІӘҒҚҢӨҰҮҺ]/g.test(text) ? 'kk-KZ' : 'ru-RU';
    speech.rate = 1.05; 
    window.speechSynthesis.speak(speech);
}

let loadingIndicator = null;
function showLoading() {
    if(loadingIndicator) return;
    loadingIndicator = document.createElement("div");
    loadingIndicator.className = "msg ai";
    loadingIndicator.innerHTML = `Serik AI ойланып жатыр <span class="loading-dots"><span>.</span><span>.</span><span>.</span></span> 🧠`;
    chat.appendChild(loadingIndicator);
    chat.scrollTop = chat.scrollHeight;
}

function hideLoading() {
    if (loadingIndicator && chat.contains(loadingIndicator)) {
        chat.removeChild(loadingIndicator);
        loadingIndicator = null;
    }
}

function add(text, type, instant = false){
    let div = document.createElement("div");
    div.className = "msg " + type;
    let textSpan = document.createElement("span");
    div.appendChild(textSpan);

    if (type === "ai") {
        let copyBtn = document.createElement("button");
        copyBtn.innerText = "📋";
        copyBtn.className = "copy-btn";
        copyBtn.onclick = function() {
            navigator.clipboard.writeText(text);
            copyBtn.innerText = "✅";
            setTimeout(() => { copyBtn.innerText = "📋"; }, 2000);
        };
        div.appendChild(copyBtn);
        chat.appendChild(div);

        if (!instant) {
            let chars = [...text];
            let i = 0;
            let chunkSize = chars.length > 400 ? 4 : 1;
            let timer = setInterval(() => {
                if (i < chars.length) {
                    textSpan.innerText += chars.slice(i, i + chunkSize).join('');
                    i += chunkSize;
                    chat.scrollTop = chat.scrollHeight;
                } else {
                    clearInterval(timer);
                    if (text.length < 500) speakText(text);
                }
            }, 12);
        } else {
            textSpan.innerText = text;
            if (text.length < 500) speakText(text);
        }
    } else {
        textSpan.innerText = text;
        chat.appendChild(div);
    }

    chat.scrollTop = chat.scrollHeight;
    return div; 
}

if(chat.children.length === 0) {
    add("Сәлем, брат! Мен Serik AI-мін. Әңгімелесеміз бе, әлде бір нәрсе іздеп тауып берейін бе? ✨", "ai", false);
}

function clearChat() {
    chat.innerHTML = "";
    chatHistory = [];
    add("Чат тазартылды, брат! Дайынмын. 🚀", "ai", true);
}

function brain(text) {
    let q = text.toLowerCase().trim();
    if(memory[q]) return memory[q];
    return null;
}

function checkAdmin(){
    let pass = document.getElementById("adminPass").value;
    document.getElementById("adminPanel").style.display = (pass === "nurik777") ? "block" : "none";
}

function bulkLearn(){
    let text = document.getElementById("bulk").value;
    let lines = text.split("\n");
    let count = 0;
    let newMemory = Object.assign({}, memory);

    for(let line of lines){
        line = line.trim();
        if(!line.includes(" это ")) continue;
        let parts = line.split(" это ");
        let q = parts[0].trim().toLowerCase();
        let a = parts.slice(1).join(" это ").trim();
        if(q && a){ newMemory[q] = a; count++; }
    }
    
    if (count > 0) {
        memory = newMemory;
        if (db) {
            db.ref('serik_memory').set(memory);
            alert("✅ Сақталды!");
        }
    }
    document.getElementById("bulk").value = "";
}

function changeTheme() {
    let theme = document.getElementById("themeSelect").value;
    document.body.className = "theme-" + theme;
}

function generateText(prompt) {
    document.getElementById("input").value = prompt;
    send();
}

// --- СТАБИЛЬНЫЙ LLAMA + GOOGLE SEARCH ЖҮЙЕСІ (ҚАТЕЛІККЕ ТӨЗІМДІ) ---
async function askSmartAI(queryText) {
    chatHistory.push({ role: "user", content: queryText });
    if (chatHistory.length > 8) chatHistory.shift(); // Историяны 8 хабарламамен шектеу (асып кетпеуі үшін)

    try {
        // 1-ҚАДАМ: Llama маршрутизаторы
        let routePrompt = [
            { 
                role: "system", 
                content: "Если запрос пользователя требует поиска свежей информации в интернете, фактов, погоды или дат — ответь строго одним словом: 'FACT'. Иначе ответь: 'CHAT'." 
            },
            { role: "user", content: queryText }
        ];

        let routeRes = await fetch("https://text.pollinations.ai/", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ messages: routePrompt, model: "llama", private: true })
        });
        
        if (!routeRes.ok) throw new Error("Router Server Error");
        let routeDecision = await routeRes.text();
        let isFactRequest = routeDecision.toUpperCase().includes("FACT");

        let fetchedFacts = "";

        // 2-ҚАДАМ: Гуглдан факт іздеу
        if (isFactRequest) {
            let searchRes = await fetch("https://text.pollinations.ai/", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ 
                    messages: [
                        { role: "system", content: "Кратко найди факты по запросу пользователя." },
                        { role: "user", content: queryText }
                    ], 
                    model: "llama", 
                    search: true, // Google Search
                    private: true 
                })
            });
            if (searchRes.ok) {
                fetchedFacts = await searchRes.text();
                // Факт тым үлкен болып кетсе қысқартамыз
                if(fetchedFacts.length > 1500) fetchedFacts = fetchedFacts.substring(0, 1500) + "..."; 
            }
        }

        // 3-ҚАДАМ: Финалды жауап (Llama)
        let systemInstruction = `Ты — Serik AI. Өте ақылды, бауырлас, құрметті ИИ-ассистентсің. Қолданушымен нағыз дос, бауыр сияқты (брат, бауырым) сөйлесесің.
Жауапты қазақ тілінде, достық рухта, анық етіп бер.
${isFactRequest && fetchedFacts ? "Мынау интернеттен алынған фактілер: " + fetchedFacts + ". Осы фактіні бұрмаламай пайдалан, бірақ 'Мен гуглдан қарадым' деп айтпа, өзің біліп тұрғандай әңгімеле." : "Бұл жай достық әңгіме."}`;

        let finalPrompt = [
            { role: "system", content: systemInstruction },
            ...chatHistory
        ];

        let finalRes = await fetch("https://text.pollinations.ai/", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ messages: finalPrompt, model: "llama", private: true })
        });
        
        if (!finalRes.ok) throw new Error("Final Llama Server Error");
        let finalOutput = await finalRes.text();
        let resultText = finalOutput.trim();

        if(!resultText || resultText.includes('"error"')) throw new Error("Empty Answer");

        chatHistory.push({ role: "assistant", content: resultText });
        return resultText;

    } catch (e) {
        console.error("Жүйеде кідіріс болды, запасной ми қосылды:", e);
        
        // ЗАПАСНОЙ МИ (FALLBACK) - Егер күрделі 3 қадамдық алгоритм құласа, қарапайым сұрау кетеді
        try {
            let fallbackRes = await fetch("https://text.pollinations.ai/", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ 
                    messages: [
                        { role: "system", content: "Ты Serik AI. Отвечай на казахском языке как братан." },
                        { role: "user", content: queryText }
                    ], 
                    model: "llama" 
                })
            });
            let fallbackText = await fallbackRes.text();
            let res = fallbackText.trim();
            chatHistory.push({ role: "assistant", content: res });
            return res;
        } catch (err) {
            return "Брат, қазір интернетте немесе серверде үлкен нагрузка болып жатыр. Сәлден соң қайта жазып жіберші! 🔄";
        }
    }
}

async function send() {
    let input = document.getElementById("input");
    let text = input.value.trim();
    if (!text) return;
    
    add(text, "user");
    input.value = "";

    // 1. МАТЕМАТИКА
    if (/^[0-9\s\+\-\*\/\(\)\.]+$/.test(text)) {
        showLoading();
        try {
            let mathResult = eval(text);
            setTimeout(() => { 
                hideLoading();
                add(`🧮 Жауабы: ${mathResult}`, "ai");
            }, 400);
            return;
        } catch(e) { }
    }

    // 2. БАЗАДАН ЕСКЕ АЛУ
    let res = brain(text);
    if (res) {
        showLoading();
        setTimeout(() => { 
            hideLoading();
            add(res, "ai");
        }, 300);
        return;
    }

    let lowerText = text.toLowerCase();

    // 3. СУРЕТ САЛУ
    if (lowerText.includes("нарисуй") || lowerText.includes("сурет сал") || lowerText.includes("сгенерируй")) {
        showLoading();
        let userPrompt = text.replace(/(нарисуй|сурет сал|сгенерируй)/gi, "").trim();
        let enhancedPrompt = userPrompt + ", high quality, 8k resolution, cinematic lighting";
        let randomSeed = Math.floor(Math.random() * 1000000);
        let imageUrl = `https://image.pollinations.ai/prompt/${encodeURIComponent(enhancedPrompt)}?width=1024&height=1024&nologo=true&seed=${randomSeed}`;
        
        let img = document.createElement("img");
        img.style.width = "100%";
        img.style.borderRadius = "10px";
        img.style.marginTop = "10px";
        
        img.onload = function() {
            hideLoading();
            let div = add("🎨 Сұраған суретің дайын, брат:", "ai", true);
            div.appendChild(img);
            chat.scrollTop = chat.scrollHeight;
        };
        
        img.onerror = function() {
            hideLoading();
            add("❌ Сурет жүктелмеді, қайтадан байқап көрші.", "ai", true);
        };

        img.src = imageUrl;
        return; 
    }

    // 4. СМАРТ ЖҮЙЕ
    showLoading();
    let finalAnswer = await askSmartAI(text); 
    hideLoading();
    add(finalAnswer, "ai");
}
</script>
</body>
</html>
