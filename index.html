<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Serik AI</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <style>
        /* Осы жерге өзіңнің CSS стильдеріңді қоясың */
    </style>
</head>
<body>

<div class="sidebar">
    <h3>🤖 Serik AI</h3>
    <button id="authBtn" onclick="toggleAuth()" style="background: #4285F4; color: white; width: 100%; margin-bottom: 10px; padding: 10px; border: none; border-radius: 5px; cursor: pointer;">👤 Войти через Google</button>
    <button id="menuToggle" onclick="toggleSettings()">⚙️ Настройки <span>🔽</span></button>
</div>

<div id="chat"></div>
<input type="text" id="input" placeholder="Введите ваш вопрос...">
<button onclick="send()">Отправить</button>

<script>
    // --- 1. КОНФИГУРАЦИЯ ---
    const firebaseConfig = {
        apiKey: "СЕНІҢ_API_KEY",
        authDomain: "СЕНІҢ_PROJECT_ID.firebaseapp.com",
        databaseURL: "https://СЕНІҢ_PROJECT_ID.firebaseio.com",
        projectId: "СЕНІҢ_PROJECT_ID",
        storageBucket: "СЕНІҢ_PROJECT_ID.appspot.com",
        messagingSenderId: "СЕНІҢ_ID",
        appId: "СЕНІҢ_APP_ID"
    };

    if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
    const db = firebase.database();
    const auth = firebase.auth();
    const provider = new firebase.auth.GoogleAuthProvider();

    // --- 2. АВТОРИЗАЦИЯ ФУНКЦИЯСЫ ---
    auth.onAuthStateChanged((user) => {
        let btn = document.getElementById("authBtn");
        if (user) {
            btn.innerText = `🚪 Выйти (${user.displayName})`;
            btn.style.background = "#ff4d4d";
        } else {
            btn.innerText = "👤 Войти через Google";
            btn.style.background = "#4285F4";
        }
    });

    function toggleAuth() {
        if (auth.currentUser) {
            auth.signOut();
        } else {
            auth.signInWithPopup(provider);
        }
    }

    // --- 3. НЕГІЗГІ SEND ФУНКЦИЯСЫ ---
    async function send() {
        let input = document.getElementById("input");
        let text = input.value.trim();
        if (!text) return;
        
        add(text, "user");
        input.value = "";

        // 1. МАТЕМАТИКА
        if (/^[0-9\s\+\-\*\/\(\)\.]+$/.test(text)) {
            let res = eval(text);
            add(`🧮 Ответ: ${res}`, "ai");
            return;
        }

        let lowerText = text.toLowerCase();

        // 2. ФОТОГЕНЕРАТОР (ШЕКСІЗ)
        if (lowerText.includes("нарисуй") || lowerText.includes("сурет сал") || lowerText.includes("сгенерируй")) {
            showLoading();
            let cleanPrompt = text.replace(/(нарисуй|сурет сал|сгенерируй)/gi, "").trim() || "beautiful landscape";
            let randomSeed = Math.floor(Math.random() * 1000000);
            let imageUrl = `https://image.pollinations.ai/prompt/${encodeURIComponent(cleanPrompt)}?width=512&height=512&nologo=true&seed=${randomSeed}`;
            
            hideLoading();
            let div = add("🎨 Вот твой рисунок:", "ai", true);
            let img = document.createElement("img");
            img.src = imageUrl;
            img.style.width = "100%";
            img.style.borderRadius = "10px";
            div.appendChild(img);
            return;
        }

        // 3. AI ЗАПРОС
        showLoading();
        let answer = await askSmartAI(text);
        hideLoading();
        add(answer, "ai");
    }

    // --- Осы жерге өз add(), showLoading(), askSmartAI() функцияларыңды қос ---

</script>
</body>
</html>
