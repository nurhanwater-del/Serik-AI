<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>
{
  "@context": "https://schema.org",
  "@type": "WebSite",
  "name": "Serik AI",
  "url": "https://serik-ai.vercel.app"
}
</title>

<meta name="google-site-verification" content="google9a22931bc29d7cd7" />

<script src="https://unpkg.com/@lottiefiles/lottie-player@latest/dist/lottie-player.js"></script>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<style>
* { box-sizing: border-box; }
body { margin: 0; font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; background: #0f0f14; color: white; display: flex; height: 100vh; overflow: hidden; transition: background 0.4s, color 0.4s; }

::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: #444; border-radius: 4px; }
::-webkit-scrollbar-thumb:hover { background: #00b86b; }

.sidebar { width: 280px; background: #1a1a24; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; transition: background 0.4s; z-index: 10; box-shadow: 2px 0 15px rgba(0,0,0,0.5); }
.sidebar h3 { text-align: center; margin-top: 0; font-size: 22px; text-transform: uppercase; letter-spacing: 1px; color: #00b86b; text-shadow: 0 0 10px rgba(0,184,107,0.3); }

#menuToggle { background: #2b2b3a; border: 1px solid #444; color: white; padding: 12px; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.3s; display: flex; justify-content: space-between; align-items: center; }
#menuToggle:hover { background: #3a3a4d; border-color: #00b86b; }
.settings-menu { display: none; flex-direction: column; gap: 10px; background: #111118; padding: 15px; border-radius: 10px; border: 1px solid #333; margin-top: -5px; }
.settings-menu.open { display: flex; animation: fadeIn 0.3s ease; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }

.main { flex: 1; display: flex; flex-direction: column; min-width: 0; background: transparent; position: relative; height: 100vh; }
.chat { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; scroll-behavior: smooth; }

.msg { padding: 14px 18px; margin: 8px 0; border-radius: 14px; max-width: 85%; white-space: pre-wrap; word-wrap: break-word; position: relative; box-shadow: 0 4px 15px rgba(0,0,0,0.2); line-height: 1.5; font-size: 15px; transition: transform 0.2s ease-out; }
.user { background: linear-gradient(135deg, #00b86b, #008f53); margin-left: auto; color: white; border-bottom-right-radius: 4px; }
.ai { background: linear-gradient(135deg, #2b2b3a, #20202d); margin-right: auto; border-bottom-left-radius: 4px; border: 1px solid rgba(255,255,255,0.05); }

.row { display: flex; flex-direction: column; border-top: 1px solid #222; background: #111; padding: 15px; gap: 10px; z-index: 10; box-shadow: 0 -5px 15px rgba(0,0,0,0.3); }
.input-group { display: flex; gap: 10px; width: 100%; }

input, textarea { width: 100%; padding: 14px; border: 1px solid #333; border-radius: 8px; outline: none; background: #16161a; color: white; font-size: 16px; transition: 0.3s; }
input:focus, textarea:focus { border-color: #00b86b; box-shadow: 0 0 10px rgba(0,184,107,0.2); }
button, select { padding: 12px; background: #00b86b; border: none; border-radius: 8px; color: white; cursor: pointer; font-weight: bold; font-size: 15px; transition: 0.3s; }
button:hover { background: #009e5b; transform: scale(1.02); }
select { background: #2b2b3a; width: 100%; color: white; }

#voiceBtn { background: #444; }
#voiceBtn.active { background: linear-gradient(135deg, #007bff, #0056b3); }
#adminPanel { display: none; margin-top: 10px; background: #222230; padding: 15px; border-radius: 10px; }

.generators { display: flex; gap: 10px; padding: 12px 15px; background: #1a1a24; border-top: 1px solid #2b2b3a; overflow-x: auto; white-space: nowrap; }
.generators button { background: #2b2b3a; padding: 8px 14px; font-size: 13px; border: 1px solid #444; border-radius: 20px; font-weight: normal; }
.generators button:hover { background: #00b86b; border-color: #00b86b; }

.copy-btn { position: absolute; top: 8px; right: 8px; background: rgba(0,0,0,0.3); border: none; cursor: pointer; font-size: 14px; padding: 6px; border-radius: 6px; opacity: 0; transition: 0.3s; }
.msg.ai:hover .copy-btn { opacity: 1; }
.disclaimer { text-align: center; font-size: 11px; color: #777; width: 100%; }

/* ТАҚЫРЫПТАР */
body.theme-hacker { background: #050505; color: #0f0; }
body.theme-hacker .sidebar { background: #000; border-right: 1px solid #0f0; }
body.theme-cyberpunk { background: #0f001a; color: #0ff; }
body.theme-cyberpunk .msg.user { background: #4d004d; border: 1px solid #f0f; }

@media (max-width: 768px) {
    body { flex-direction: column; height: 100vh; position: fixed; width: 100%; }
    .sidebar { width: 100%; max-height: 120px; padding: 8px 12px; }
    .main { height: calc(100vh - 120px); }
    .chat { padding-bottom: 90px; }
    .row { position: fixed; bottom: 0; width: 100%; }
}
</style>
</head>

<body class="theme-default">

<div class="sidebar">
    <h3>🤖 Serik AI</h3>
    <button id="menuToggle" onclick="toggleSettings()">⚙️ Настройки <span>🔽</span></button>
    <div id="settingsMenu" class="settings-menu">
        <select id="themeSelect" onchange="changeTheme()">
            <option value="default">🌙 Тёмная (По умолчанию)</option>
            <option value="hacker">💻 Хакер (Матрица)</option>
            <option value="cyberpunk">🌃 Киберпанк</option>
        </select>
        <button id="voiceBtn" onclick="toggleVoice()">🔇 Голос: ВЫКЛ</button>
        <input type="password" id="adminPass" placeholder="Пароль админа" oninput="checkAdmin()">
        <div id="adminPanel">
            <textarea id="bulk" placeholder="вопрос это ответ"></textarea>
            <button onclick="bulkLearn()" style="width: 100%; margin-top: 5px;">Сохранить базу</button>
        </div>
    </div>
</div>

<div class="main">
    <div class="chat" id="chat"></div>
    <div class="generators">
        <button onclick="generateText('Маған комикс видеосын жаса')">🦸‍♂️ Комикс жаса</button>
        <button onclick="generateText('Маған видео жаса')">📹 Видео жаса</button>
        <button onclick="generateText('Маған сурет сал')">🎨 Сурет сал</button>
    </div>

    <div class="row">
        <div class="input-group">
            <button onclick="clearChat()" style="background: #ff4d4d; min-width: 50px;">🗑️</button>
            <input id="input" placeholder="Введите ваш вопрос..." onkeydown="if(event.key==='Enter') send()">
            <button onclick="send()">Отправить</button>
        </div>
        <div class="disclaimer">Serik ai это ИИ. ИИ может ошибаться.</div>
    </div>
</div>

<script>
let chatHistory = [];

function clearChat() {
    chat.innerHTML = "";
    chatHistory = [];
    add("Привет! Я Serik AI. Чат очищен и готов к работе! ✨", "ai", false);
}

// FIREBASE
const firebaseConfig = {
  apiKey: "AIzaSyAzofVJLZNadLA1-1XsCSqCukJ4gkPzqoo",
  authDomain: "serik-ai.firebaseapp.com",
  databaseURL: "https://serik-ai-default-rtdb.firebaseio.com",
  projectId: "serik-ai"
};

let memory = {
    "привет": "Привет! Я готов помочь.",
    "неге серік": "Серік AI атауы — менің авторымның әкесіне деген құрметі."
};
let db = null;

let currentSystemPrompt = `Ты ИИ Serik-AI из Казахстана. Имя дано в честь отца создателя. Пиши как живой человек. Без списков.`;

if (firebaseConfig.apiKey) {
    firebase.initializeApp(firebaseConfig);
    db = firebase.database();
    db.ref('serik_memory').on('value', (snapshot) => {
        if (snapshot.val()) { memory = Object.assign(memory, snapshot.val()); }
    });
}

const chat = document.getElementById("chat");
let voiceEnabled = false;

function toggleSettings() {
    let menu = document.getElementById("settingsMenu");
    menu.classList.toggle("open");
}

function toggleVoice() {
    voiceEnabled = !voiceEnabled;
    let btn = document.getElementById("voiceBtn");
    btn.innerText = voiceEnabled ? "🔊 Голос: ВКЛ" : "🔇 Голос: ВЫКЛ";
    btn.classList.toggle("active", voiceEnabled);
    if (!voiceEnabled) window.speechSynthesis.cancel();
}

function speakText(text) {
    if (!voiceEnabled) return;
    window.speechSynthesis.cancel(); 
    let cleanText = text.replace(/[\p{Emoji_Presentation}\p{Extended_Pictographic}]/gu, '');
    let speech = new SpeechSynthesisUtterance(cleanText);
    speech.lang = /[әғқңөұүһі]/g.test(text) ? 'kk-KZ' : 'ru-RU';
    window.speechSynthesis.speak(speech);
}

// ЛОАДЕР
let loadingIndicator = null;
function showLoading(msg = "Серик ойланып жатыр...") {
    if(loadingIndicator) return;
    loadingIndicator = document.createElement("div");
    loadingIndicator.className = "msg ai";
    loadingIndicator.innerHTML = `
        <div style="display:flex; align-items:center; gap:12px;">
            <lottie-player src="https://lottie.host/6f0b8b60-c36b-4e1d-8756-3b9cd4b9ba6e/v3fH02JofE.json" speed="1.5" style="width: 35px; height: 35px;" loop autoplay></lottie-player>
            <span style="font-size: 14px; color: #00b86b; font-weight: bold;">${msg}</span>
        </div>`;
    chat.appendChild(loadingIndicator);
    chat.scrollTop = chat.scrollHeight;
}

function hideLoading() {
    if (loadingIndicator && chat.contains(loadingIndicator)) {
        chat.removeChild(loadingIndicator);
        loadingIndicator = null;
    }
}

function add(text, type, instant = false){
    let div = document.createElement("div");
    div.className = "msg " + type;
    div.innerText = text;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
    if (type === "ai" && !instant && text.length < 500) speakText(text);
    return div; 
}

if(chat.children.length === 0) add("Привет! Я Serik AI Pro. ✨", "ai", true);

function brain(text) {
    let q = text.toLowerCase().trim();
    if(memory[q]) return memory[q];
    return null;
}

function changeTheme() {
    document.body.className = "theme-" + document.getElementById("themeSelect").value;
}

function generateText(prompt) {
    document.getElementById("input").value = prompt;
    send();
}

async function askSmartAI(queryText) {
    chatHistory.push({ role: "user", content: queryText });
    if (chatHistory.length > 6) chatHistory.shift();
    let context = chatHistory.map(h => `${h.role}: ${h.content}`).join("\n");
    let fullPrompt = `${currentSystemPrompt}\n\nContext:\n${context}\n\nUser: ${queryText}`;

    try {
        let url = `https://text.pollinations.ai/${encodeURIComponent(fullPrompt)}?model=openai`;
        let res = await fetch(url);
        let text = await res.text();
        if(text && text.length > 5) {
            chatHistory.push({ role: "assistant", content: text.trim() });
            return text.trim();
        }
    } catch (e) { return "Сервер перегружен. Попробуй позже."; }
    return "Қате кетті, қайтадан көріңіз.";
}

// =========================================================
// 🔥 БАСТЫ СЕНД ФУНКЦИЯСЫ: ФОТО, КОМИКС ЖӘНЕ НАҒЫЗ ВИДЕО
// =========================================================
async function send(){
    let input = document.getElementById("input");
    let text = input.value.trim();
    if(!text) return;
    
    add(text, "user");
    input.value = "";
    let textLower = text.toLowerCase();

    // 1️⃣ 🦸‍♂️ КОМИКС / АНИМАЦИЯ (LOTTIE + ИИ СУРЕТ - ӨТЕ ЖЫЛДАМ)
    if (textLower.includes("комикс") || textLower.includes("анимация")) {
        showLoading("Комикс жасалуда (Жылдам)...");
        let cleanPrompt = text.replace(/(комикс видеосын|комикс жаса|анимация жаса|комикс|анимация|жаса|маған)/gi, "").trim();
        let englishPrompt = cleanPrompt ? cleanPrompt + ", high quality anime style" : "cyberpunk racing sports car driving in neon city, high quality anime style";

        let imageUrl = `https://image.pollinations.ai/prompt/${encodeURIComponent(englishPrompt)}?width=1024&height=720&nologo=true&private=true`;
        
        setTimeout(() => {
            hideLoading();
            let div = document.createElement("div");
            div.className = "msg ai";
            div.innerHTML = `
                <p>✨ Твой комикс готов: "${cleanPrompt || 'комикс'}"</p>
                <div style="position: relative; background: #000; border-radius: 12px; overflow: hidden; width: 100%; aspect-ratio: 16/10;">
                    <img src="${imageUrl}" style="width: 100%; height: 100%; object-fit: cover; display: block;">
                    <div style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; opacity: 0.65;">
                        <lottie-player src="https://lottie.host/df293774-4bda-4702-bf0b-6060ee693d20/z63K2E20Yn.json" speed="1" style="width: 100%; height: 100%;" loop autoplay></lottie-player>
                    </div>
                </div>
                <p style="font-size: 11px; color: #aaa; margin-top: 6px; text-align: center;">📱 Жылдам комикс режимі (Қатпайды)</p>
            `;
            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;
        }, 1500);
        return;
    }

    // 2️⃣ 📹 НАҒЫЗ ВИДЕО (POLLINATIONS СЕРВЕРІНЕН СТРИМ - 1 МИНУТ АЛАДЫ)
    if (textLower.includes("видео") || textLower.includes("video")) {
        showLoading("Видео генерациялануда (Шамамен 1 минут күтіңіз)...");
        let cleanPrompt = text.replace(/(видеосын жаса|видео жаса|сделай видео|видео|video|маған)/gi, "").trim();
        let englishPrompt = cleanPrompt ? cleanPrompt + ", looping action scene, cinematic" : "epic cinematic shot, looping action";

        // Видео ссылкасы
        let videoUrl = `https://image.pollinations.ai/prompt/${encodeURIComponent(englishPrompt)}?width=720&height=480&model=flux&nologo=true&private=true&feed=true`;
        
        // 10 секундтан кейін плеерді шығарамыз, бірақ видеоның өзі жүктелуі 1 минут алуы мүмкін
        setTimeout(() => {
            hideLoading();
            let div = document.createElement("div");
            div.className = "msg ai";
            div.innerHTML = `
                <p>📹 Нағыз видео жүктелуде: "${cleanPrompt || 'видео'}"</p>
                <div style="background: #111; border-radius: 8px; padding: 5px; box-shadow: 0 0 15px #00b86b; text-align: center;">
                    <video src="${videoUrl}" autoplay loop muted playsinline style="width: 100%; border-radius: 4px; display: block; min-height: 200px; background: #000;" onerror="this.parentElement.innerHTML='<p style=\\'color:#ff4d4d; padding:20px;\\'>Сервер перегружен. Видео не загрузилось. Попробуй позже.</p>'"></video>
                </div>
                <p style="font-size: 11px; color: #aaa; margin-top: 6px; text-align: center;">⚠️ Ескерту: Егер қара экран болса, сервер жүктелген, 1 минуттай күтіңіз.</p>
            `;
            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;
        }, 3000);
        return;
    }

    // 3️⃣ 📸 ФОТО / СУРЕТ
    if (textLower.includes("сурет") || textLower.includes("фото") || textLower.includes("нарисуй")) {
        showLoading("Сурет салынуда...");
        let cleanPrompt = text.replace(/(сурет сал|сурет|нарисуй|фото|маған)/gi, "").trim();
        let imageUrl = `https://image.pollinations.ai/prompt/${encodeURIComponent(cleanPrompt || "beautiful futuristic city")}?width=1024&height=1024&nologo=true`;
        setTimeout(() => {
            hideLoading();
            let div = document.createElement("div");
            div.className = "msg ai";
            div.innerHTML = `<p>🎨 Сурет дайын: "${cleanPrompt || 'сурет'}"</p><img src="${imageUrl}" style="width: 100%; border-radius: 8px;">`;
            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;
        }, 1500);
        return;
    }

    // 4️⃣ МАТЕМАТИКА
    if (/^[0-9\s\+\-\*\/\(\)\.]+$/.test(text)) {
        try { add(`🧮 Ответ: ${eval(text)}`, "ai"); return; } catch(e) { }
    }

    // 5️⃣ БАЗА ЖӘНЕ ИИ
    let res = brain(text);
    if(res){ add(res, "ai"); return; }

    showLoading();
    let finalAnswer = await askSmartAI(text);
    hideLoading();
    add(finalAnswer, "ai");
}
</script>
</body>
</html>
