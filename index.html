    <style>
        * {
            box-sizing: border-box;
        }
        body {
            margin: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #0f0f14;
            color: white;
            display: flex;
            height: 100vh;
            overflow: hidden;
            transition: background 0.4s, color 0.4s;
        }

        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: #444;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #00b86b;
        }

        .sidebar {
            width: 280px;
            background: #1a1a24;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
            transition: background 0.4s, left 0.3s ease;
            z-index: 10;
            box-shadow: 2px 0 15px rgba(0,0,0,0.5);
        }
        .sidebar h3 {
            text-align: center;
            margin-top: 0;
            font-size: 22px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #00b86b;
            text-shadow: 0 0 10px rgba(0,184,107,0.3);
        }
        .sidebar-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
        }
        .sidebar-tabs button {
            flex: 1;
            padding: 10px;
            background: #2b2b3a;
            border: 1px solid #444;
            color: white;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }
        .sidebar-tabs button.active {
            background: #00b86b;
            border-color: #00b86b;
            color: #fff;
        }

        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-width: 0;
            background: transparent;
            position: relative;
            height: 100vh;
        }
        .chat-container {
            display: flex;
            flex-direction: column;
            height: 100%;
        }
        .chat {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            scroll-behavior: smooth;
        }
        .msg {
            padding: 14px 18px;
            margin: 8px 0;
            border-radius: 14px;
            max-width: 85%;
            white-space: pre-wrap;
            word-wrap: break-word;
            position: relative;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            line-height: 1.5;
            font-size: 15px;
            transition: transform 0.2s ease-out;
        }
        .msg:hover {
            transform: translateY(-1px);
        }
        .user {
            background: linear-gradient(135deg, #00b86b, #008f53);
            margin-left: auto;
            color: white;
            border-bottom-right-radius: 4px;
        }
        .ai {
            background: linear-gradient(135deg, #2b2b3a, #20202d);
            margin-right: auto;
            border-bottom-left-radius: 4px;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .row {
            display: flex;
            flex-direction: column;
            border-top: 1px solid #222;
            background: #111;
            padding: 15px;
            gap: 10px;
            z-index: 10;
            box-shadow: 0 -5px 15px rgba(0,0,0,0.3);
        }
        .input-group {
            display: flex;
            gap: 10px;
            width: 100%;
        }
        input, textarea {
            width: 100%;
            padding: 14px;
            border: 1px solid #333;
            border-radius: 8px;
            outline: none;
            background: #16161a;
            color: white;
            font-size: 16px;
            transition: 0.3s;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.2);
        }
        input:focus, textarea:focus {
            border-color: #00b86b;
            box-shadow: 0 0 10px rgba(0,184,107,0.2);
        }
        button, select {
            padding: 12px;
            background: #00b86b;
            border: none;
            border-radius: 8px;
            color: white;
            cursor: pointer;
            font-weight: bold;
            font-size: 15px;
            transition: 0.3s;
            outline: none;
        }
        button:hover {
            background: #009e5b;
            transform: scale(1.02);
        }
        button:active {
            transform: scale(0.98);
        }
        select {
            background: #2b2b3a;
            width: 100%;
            color: white;
        }
        select:hover {
            background: #3a3a4d;
        }

        #voiceBtn {
            background: #444;
            border-radius: 8px;
        }
        #voiceBtn.active {

            display: none;

            padding: 15px;
            border-radius: 10px;
            border: 1px solid #333;
        }
        textarea {
            height: 120px;
            resize: none;
        }

        .generators {
            display: flex;
            gap: 10px;
            padding: 12px 15px;
            background: #1a1a24;
            border-top: 1px solid #2b2b3a;
            overflow-x: auto;
            white-space: nowrap;
        }
        .generators button {
            background: #2b2b3a;
            padding: 8px 14px;
            font-size: 13px;
            border: 1px solid #444;
            border-radius: 20px;
            font-weight: normal;
        }
        .generators button:hover {
            background: #00b86b;
            border-color: #00b86b;
            color: white;
        }

        .copy-btn {
            position: absolute;
            top: 8px;
            right: 8px;
            background: rgba(0,0,0,0.3);
            border: none;
            cursor: pointer;
            font-size: 14px;
            padding: 6px;
            border-radius: 6px;
            opacity: 0;
            transition: 0.3s;
        }
        .msg.ai:hover .copy-btn {
            opacity: 1;
        }
        .copy-btn:hover {
            background: #00b86b;
            transform: scale(1.1);
        }

        .disclaimer {
            text-align: center;
            font-size: 11px;
            color: #777;
            width: 100%;
            font-family: sans-serif;
            letter-spacing: 0.5px;
            margin-top: 2px;
        }

        .loading-dots {
            display: inline-block;
            animation: blink 1.4s infinite both;
            font-weight: bold;
            font-size: 18px;
            line-height: 1;
        }
        .loading-dots span {
            animation: blink 1.4s infinite both;
        }
        .loading-dots span:nth-child(2) {
            animation-delay: 0.2s;
        }
        .loading-dots span:nth-child(3) {
            animation-delay: 0.4s;
        }
        @keyframes blink {
            0% { opacity: 0.2; }
            20% { opacity: 1; }
            100% { opacity: 0.2; }
        }

        .image-panel {
            display: none;
            flex-direction: column;
            padding: 20px;

            height: 100%;
            overflow-y: auto;
        }
        .image-panel.active {

        .aspect-ratio button, .quality button {

            font-size: 14px;

        .aspect-ratio button.active, .quality button.active {
            background: #00b86b;
            border-color: #00b86b;
        }

            background: #16161a;

            padding: 14px;
            border-radius: 8px;
            font-size: 16px;
        }

        }

            max-width: 100%;

        body.theme-cyberpunk .sidebar {

        }
        body.theme-cyberpunk .msg.ai {
            background: #2a004d;
            border: 1px solid #0ff;

        }
        body.theme-cyberpunk .msg.user {
            background: #4d004d;
            border: 1px solid #f0f;
            color: #fff;
        }
        body.theme-cyberpunk button, body.theme-cyberpunk select {
            background: linear-gradient(45deg, #8a2be2, #f0f);

        body.theme-light {

        }
        body.theme-light .sidebar {
            background: #ffffff;

        }
        body.theme-light .msg.ai {
            background: #ffffff;
            color: #333;
            border: 1px solid #e0e0e0;

        body.theme-light .msg.user {

        body.theme-light .row, body.theme-light .generators {

        body.theme-light input, body.theme-light textarea {

        .menu-toggle-btn {
            display: none;
            position: absolute;
            top: 15px;
            left: 15px;

            background: #2b2b3a;
            border: 1px solid #444;

            }
        }

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAzofVJLZNadLA1-1XsCSqCukJ4gkPzqoo",
            authDomain: "serik-ai.firebaseapp.com",
            databaseURL: "https://serik-ai-default-rtdb.firebaseio.com",
            projectId: "serik-ai",
            storageBucket: "serik-ai.appspot.com"
        };

        const defaultMemory = {
            "привет": "Привет! Я готов помочь. Задавай любой вопрос! 👋",
            "что ты умеешь": "Я умный ИИ-ассистент. Я понимаю длинные и короткие вопросы, ищу информацию в сети, пишу эссе, рефераты! 🧠",
            "как тебя зовут": "Я Serik-AI. 🤖",
            "неге серік": "Серік AI атауы — менің авторымның әкесіне деген шексіз құрметі мен махаббатының белгісі. Бұл — өнеге мен парасаттың нышаны.",
            "почему серик": "Имя Serik AI было выбрано в честь отца моего создателя — это дань глубокого уважения, любви и вечной памяти."
        };

        let memory = Object.assign({}, defaultMemory);
        let db = null;

        if (firebaseConfig.apiKey) {
            firebase.initializeApp(firebaseConfig);
            db = firebase.database();
            db.ref('serik_memory').on('value', (snapshot) => {
                const cloudData = snapshot.val();
                if (cloudData) { memory = Object.assign({}, defaultMemory, cloudData); }
            });
        }

        const chat = document.getElementById("chat");
        let voiceEnabled = false;

        function toggleSettings() {
            let menu = document.getElementById("settingsMenu");
            let btnSpan = document.querySelector("#menuToggle span");
            if (menu.classList.contains("open")) {
                menu.classList.remove("open");
                btnSpan.innerText = "🔽";
            } else {
                menu.classList.add("open");
                btnSpan.innerText = "🔼";
            }
        }

        function toggleVoice() {
            voiceEnabled = !voiceEnabled;
            let btn = document.getElementById("voiceBtn");
            if (voiceEnabled) {
                btn.innerText = "🔊 Голос: ВКЛ (Премиум)";
                btn.classList.add("active");
            } else {
                btn.innerText = "🔇 Голос: ВЫКЛ";
                btn.classList.remove("active");
                window.speechSynthesis.cancel();
            }
        }

        function speakText(text) {
            if (!voiceEnabled) return;
            window.speechSynthesis.cancel();
            let cleanText = text.replace(/[\p{Emoji_Presentation}\p{Extended_Pictographic}📋✅⚛️📜🔥💻🛋️🤖👨‍🏫😎✨]/gu, '');
            cleanText = cleanText.replace(/[#*`~_\-()]/g, ' ');
            let speech = new SpeechSynthesisUtterance(cleanText);
            if (/[әғқңөұүһіІӘҒҚҢӨҰҮҺ]/g.test(text)) {
                speech.lang = 'kk-KZ';
            } else {
                speech.lang = 'ru-RU';
            }
            let voices = window.speechSynthesis.getVoices();
            let premiumVoice = voices.find(v => v.lang.startsWith(speech.lang.split('-')[0]) &&
                (/google|natural|premium|neural|microsoft|yuri|pavel/i.test(v.name))
            );
            if (premiumVoice) {
                speech.voice = premiumVoice;
            } else {
                let defaultLangVoice = voices.find(v => v.lang.startsWith(speech.lang.split('-')[0]));
                if (defaultLangVoice) speech.voice = defaultLangVoice;
            }
            speech.pitch = 1.0;
            speech.rate = 1.05;
            window.speechSynthesis.speak(speech);
        }
        window.speechSynthesis.onvoiceschanged = () => { window.speechSynthesis.getVoices(); };

        let loadingIndicator = null;

        function showLoading() {
            if (loadingIndicator) return;
            loadingIndicator = document.createElement("div");
            loadingIndicator.className = "msg ai";
            loadingIndicator.innerHTML = `Серик думает <span class="loading-dots"><span>.</span><span>.</span><span>.</span></span> 🧠`;
            chat.appendChild(loadingIndicator);
            chat.scrollTop = chat.scrollHeight;
        }

        function hideLoading() {
            if (loadingIndicator && chat.contains(loadingIndicator)) {
                chat.removeChild(loadingIndicator);
                loadingIndicator = null;
            }
        }

        function add(text, type, instant = false) {
            let div = document.createElement("div");
            div.className = "msg " + type;
            let textSpan = document.createElement("span");
            div.appendChild(textSpan);

            if (type === "ai") {
                let copyBtn = document.createElement("button");
                copyBtn.innerText = "📋";
                copyBtn.className = "copy-btn";
                copyBtn.onclick = function() {
                    navigator.clipboard.writeText(text);
                    copyBtn.innerText = "✅";
                    setTimeout(() => { copyBtn.innerText = "📋"; }, 2000);
                };
                div.appendChild(copyBtn);
                chat.appendChild(div);

                if (!instant) {
                    let chars = [...text];
                    let i = 0;
                    let chunkSize = chars.length > 400 ? 4 : 1;
                    let timer = setInterval(() => {
                        if (i < chars.length) {
                            textSpan.innerText += chars.slice(i, i + chunkSize).join('');
                            i += chunkSize;
                            chat.scrollTop = chat.scrollHeight;
                        } else {
                            clearInterval(timer);
                            if (text.length < 500) speakText(text);
                        }
                    }, 12);
                } else {
                    textSpan.innerText = text;
                    if (text.length < 500) speakText(text);
                }
            } else {
                textSpan.innerText = text;
                chat.appendChild(div);
            }
            chat.scrollTop = chat.scrollHeight;
            return div;
        }

        if (chat.children.length === 0) {
            add("Привет! Я Serik AI Pro. Откройте ⚙️ Настройки, чтобы включить голос! ✨", "ai", false);
        }

        // Техникалық ескерту – «нарисуй» туралы сөйлем жоқ
        hideLoading();
        add(`🔧 Технический перерыв

Текстовый ИИ временно недоступен из-за обновления серверов.

        function levenshteinDistance(a, b) {
            if (a.length === 0) return b.length;
            if (b.length === 0) return a.length;
            let matrix = [];
            for (let i = 0; i <= b.length; i++) { matrix[i] = [i]; }
            for (let j = 0; j <= a.length; j++) { matrix[0][j] = j; }
            for (let i = 1; i <= b.length; i++) {
                for (let j = 1; j <= a.length; j++) {
                    if (b.charAt(i - 1) === a.charAt(j - 1)) {
                        matrix[i][j] = matrix[i - 1][j - 1];
                    } else {
                        matrix[i][j] = Math.min(
                            matrix[i - 1][j - 1] + 1,
                            Math.min(matrix[i][j - 1] + 1,
                                matrix[i - 1][j] + 1)
                        );
                    }
                }
            }
            return matrix[b.length][a.length];
        }

        function brain(text) {
            let q = text.toLowerCase().trim();
            let qNoSpace = q.replace(/\s+/g, "");
            if (memory[q]) return memory[q];
            let bestMatch = null;
            let minDistance = 3;
            for (let key in memory) {
                let keyNoSpace = key.toLowerCase().replace(/\s+/g, "");
                if (qNoSpace === keyNoSpace) {
                    return memory[key];
                }
                let dist = levenshteinDistance(q, key.toLowerCase());
                if (dist < minDistance) {
                    minDistance = dist;
                    bestMatch = key;
                }
            }
            if (bestMatch) return memory[bestMatch];
            return null;
        }

        function bulkLearn() {
            let text = document.getElementById("bulk").value;
            let lines = text.split("\n");
            let count = 0;
            let newMemory = Object.assign({}, memory);
            for (let line of lines) {
                line = line.trim();
                if (!line.includes(" это ")) continue;
                let parts = line.split(" это ");
                let q = parts[0].trim().toLowerCase();
                let a = parts.slice(1).join(" это ").trim();
                if (q && a) { newMemory[q] = a;
                    count++; }
            }
            if (count > 0) {
                memory = newMemory;
                if (db) {
                    db.ref('serik_memory').set(memory);
                    alert("✅ Успешно сохранено в облаке Firebase!");
                }
            }
            document.getElementById("bulk").value = "";
        }

        function generateImageFromPanel() {
            const promptInput = document.getElementById('imagePrompt');
            let rawPrompt = promptInput.value.trim();
            if (!rawPrompt) {
                alert('Промптты енгізіңіз');
                return;
            }

            let cleanPrompt = rawPrompt.replace(/(нарисуй|сурет сал|сгенерируй)/gi, '').trim();
            if (cleanPrompt === '') {
                alert('Сипаттаманы енгізіңіз');
                return;
            }

            let baseHeight;
            switch (currentQuality) {
                case 'hd':
                    baseHeight = 720;
                    break;
                case '1080p':
                    baseHeight = 1080;
                    break;
                case '2040p':
                    baseHeight = 2040;
                    break;
                default:
                    baseHeight = 720;
            }

            let width, height;
            switch (currentAspect) {
                case '1:1':
                    width = baseHeight;
                    height = baseHeight;
                    break;
                case '16:9':
                    width = Math.round(baseHeight * 16 / 9);
                    height = baseHeight;
                    break;
                case '9:16':
                    width = baseHeight;
                    height = Math.round(baseHeight * 16 / 9);
                    break;
                default:
                    width = baseHeight;
                    height = baseHeight;
            }

            let enhancedPrompt = cleanPrompt +
                ", exact object, pure clean focus, masterpiece, 16k resolution, ultra detailed, hyperrealistic, 8k uhd, cinematic lighting, no text, no artifacts";
            let randomSeed = Math.floor(Math.random() * 1000000000);
            let imageUrl =
                `https://image.pollinations.ai/prompt/${encodeURIComponent(enhancedPrompt)}?width=${width}&height=${height}&nologo=true&seed=${randomSeed}`;

            const container = document.getElementById('generatedImageContainer');
            container.innerHTML = '<p>Генерация... 🎨</p>';

            let img = document.createElement("img");
            img.style.maxWidth = "100%";
            img.style.borderRadius = "10px";
            img.style.marginTop = "10px";

            img.onload = function() {
                container.innerHTML = '';
                container.appendChild(img);

                let downloadBtn = document.createElement("button");
                downloadBtn.innerText = "📥 Скачать";
                downloadBtn.style.marginTop = "10px";
                downloadBtn.onclick = function() {
                    fetch(imageUrl)
                        .then(response => response.blob())
                        .then(blob => {
                            const url = URL.createObjectURL(blob);
                            const a = document.createElement('a');
                            a.href = url;
                            a.download = 'Serik_AI.png';
                            a.click();
                            URL.revokeObjectURL(url);
                        });
                };
                container.appendChild(downloadBtn);
            };

            img.onerror = function() {
                container.innerHTML = '<p style="color:red;">Қате: суретті жүктеу мүмкін болмады.</p>';
            };

            img.src = imageUrl;
        }

        async function send() {
            let input = document.getElementById("input");
            let text = input.value.trim();
            if (!text) return;

            add(text, "user");
            input.value = "";

            // Математика
            if (/^[0-9\s\+\-\*\/\(\)\.]+$/.test(text)) {
                showLoading();
                try {
                    let mathResult = eval(text);
                    setTimeout(() => {
                        hideLoading();
                        add(`🧮 Ответ: ${mathResult}`, "ai");
                    }, 700);
                    return;
                } catch (e) {}
            }

            // Brain
            let res = brain(text);
            if (res) {
                showLoading();
                setTimeout(() => {
                    hideLoading();
                    add(res, "ai");
                }, 400);
                return;
            }

            let lowerText = text.toLowerCase();

            // Vision API
            let imgUrlMatch = text.match(/https?:\/\/\S+\.(?:png|jpg|jpeg|webp|gif)/i);
            if (imgUrlMatch) {
                showLoading();
                let detectedImageUrl = imgUrlMatch[0];
                let cleanQuestion = text.replace(detectedImageUrl, "").trim() || "Что на этом изображении?";
                try {
                    let visionUrl =
                        `https://text.pollinations.ai/${encodeURIComponent(cleanQuestion)}?image=${encodeURIComponent(detectedImageUrl)}&model=openai`;
                    let res = await fetch(visionUrl);
                    let responseText = await res.text();
                    hideLoading();
                    add(`👁️ [Анализ изображения]:\n\n${responseText.trim()}`, "ai");
                    return;
                } catch (e) {
                    console.error("Ошибка Vision API:", e);
                }
            }

            // Егер «нарисуй» деп жазса – чатта сурет ЖАСАМАЙДЫ, тек хабарлама береді
            if (lowerText.includes("нарисуй") || lowerText.includes("сурет сал") || lowerText.includes("сгенерируй")) {
                hideLoading();
                add("🎨 Для генерации изображений перейдите во вкладку **Images** в боковом меню. Там вы сможете выбрать размер, качество и создать картинку!", "ai");
                return;
            }

            hideLoading();
            add("Технический перерыв!. Попробуйте спросить иначе или перейдите во вкладку Images для генерации изображений.", "ai");
        }
