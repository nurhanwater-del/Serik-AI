// --- ҚҰЛАҚҚА ЖАҒЫМДЫ ТАБИҒИ AI ДАУЫСЫ ФУНКЦИЯСЫ ---
function speakText(text) {
    if (!voiceEnabled) return;
    window.speechSynthesis.cancel(); 

    let cleanText = text.replace(/[\p{Emoji_Presentation}\p{Extended_Pictographic}📋✅⚛️📜🔥💻🛋️🤖👨‍🏫😎✨]/gu, '');
    cleanText = cleanText.replace(/[#*`~_\-()]/g, ' ');
    
    let speech = new SpeechSynthesisUtterance(cleanText);
    
    if (/[әғқңөұүһіІӘҒҚҢӨҰҮҺ]/g.test(text)) {
        speech.lang = 'kk-KZ';
    } else {
        speech.lang = 'ru-RU';
    }
    
    let voices = window.speechSynthesis.getVoices();
    
    let premiumVoice = voices.find(v => v.lang.startsWith(speech.lang.split('-')[0]) && 
        (/google|natural|premium|neural|microsoft|yuri|pavel/i.test(v.name))
    );
    
    if (premiumVoice) {
        speech.voice = premiumVoice;
    } else {
        let defaultLangVoice = voices.find(v => v.lang.startsWith(speech.lang.split('-')[0]));
        if (defaultLangVoice) speech.voice = defaultLangVoice;
    }
    
    speech.pitch = 1.0; 
    speech.rate = 1.05; 
    
    window.speechSynthesis.speak(speech);
}

window.speechSynthesis.onvoiceschanged = () => { window.speechSynthesis.getVoices(); };

let loadingIndicator = null;

function add(text, type, instant = false){
    let div = document.createElement("div");
    div.className = "msg " + type;
    
    let textSpan = document.createElement("span");
    div.appendChild(textSpan);

    if (type === "ai") {
        let copyBtn = document.createElement("button");
        copyBtn.innerText = "📋";
        copyBtn.className = "copy-btn";
        copyBtn.onclick = function() {
            navigator.clipboard.writeText(text);
            copyBtn.innerText = "✅";
            setTimeout(() => { copyBtn.innerText = "📋"; }, 2000);
        };
        div.appendChild(copyBtn);
        chat.appendChild(div);

        if (!instant) {
            let chars = [...text];
            let i = 0;
            let chunkSize = chars.length > 400 ? 4 : 1;
            
            let timer = setInterval(() => {
                if (i < chars.length) {
                    textSpan.innerText += chars.slice(i, i + chunkSize).join('');
                    i += chunkSize;
                    chat.scrollTop = chat.scrollHeight;
                } else {
                    clearInterval(timer);
                    if (text.length < 500) speakText(text);
                }
            }, 12);
        } else {
            textSpan.innerText = text;
            if (text.length < 500) speakText(text);
        }
    } else {
        textSpan.innerText = text;
        chat.appendChild(div);
    }

    chat.scrollTop = chat.scrollHeight;
    return div; 
}

function levenshteinDistance(a, b) {
    if (a.length === 0) return b.length;
    if (b.length === 0) return a.length;
    let matrix = [];
    for (let i = 0; i <= b.length; i++) { matrix[i] = [i]; }
    for (let j = 0; j <= a.length; j++) { matrix[0][j] = j; }
    for (let i = 1; i <= b.length; i++) {
        for (let j = 1; j <= a.length; j++) {
            if (b.charAt(i - 1) === a.charAt(j - 1)) {
                matrix[i][j] = matrix[i - 1][j - 1];
            } else {
                matrix[i][j] = Math.min(
                    matrix[i - 1][j - 1] + 1, 
                    Math.min(matrix[i][j - 1] + 1, 
                    matrix[i - 1][j] + 1) 
                );
            }
        }
    }
    return matrix[b.length][a.length];
}

function brain(text) {
    let q = text.toLowerCase().trim();
    let qNoSpace = q.replace(/\s+/g, ""); 
    
    if(memory[q]) return memory[q];

    let bestMatch = null;
    let minDistance = 3; 

    for (let key in memory) {
        let keyNoSpace = key.toLowerCase().replace(/\s+/g, "");
        
        if (qNoSpace === keyNoSpace) {
            return memory[key];
        }

        let dist = levenshteinDistance(q, key.toLowerCase());
        if (dist < minDistance) {
            minDistance = dist;
            bestMatch = key;
        }
    }

    if (bestMatch) {
        return memory[bestMatch];
    }

    return null;
}

function bulkLearn(){
    let text = document.getElementById("bulk").value;
    let lines = text.split("\n");
    let count = 0;
    let newMemory = Object.assign({}, memory);

    for(let line of lines){
        line = line.trim();
        if(!line.includes(" это ")) continue;
        let parts = line.split(" это ");
        let q = parts[0].trim().toLowerCase();
        let a = parts.slice(1).join(" это ").trim();
        if(q && a){ newMemory[q] = a; count++; }
    }
    
    if (count > 0) {
        memory = newMemory;
        if (db) {
            db.ref('serik_memory').set(memory);
            alert("✅ Успешно сохранено в облаке Firebase!");
        }
    }
    document.getElementById("bulk").value = "";
}

async function searchWebFallback(queryText) {
    try {
        let cleanQuery = queryText.replace(/(пожалуйста|расскажи про|что такое|кто такой|найди|гугл|google|реферат|эссе|кратко)/gi, "").trim();
        let searchUrl = `https://ru.wikipedia.org/w/api.php?action=query&list=search&srsearch=${encodeURIComponent(cleanQuery)}&format=json&origin=*`;
        let res = await fetch(searchUrl);
        let data = await res.json();
        
        if (data.query.search.length > 0) {
            let title = data.query.search[0].title;
            let contentUrl = `https://ru.wikipedia.org/w/api.php?action=query&prop=extracts&exintro=0&explaintext=1&titles=${encodeURIComponent(title)}&format=json&origin=*`;
            let contentRes = await fetch(contentUrl);
            let contentData = await contentRes.json();
            let pages = contentData.query.pages;
            let extract = pages[Object.keys(pages)[0]].extract;
            
            if (extract && extract.trim().length > 30) {
                if(queryText.toLowerCase().includes("кратко")) {
                    return `🤖 [Smart Web Search]: ${extract.split(/(?<=[.!?])\s+/).slice(0, 2).join(" ")}`;
                }
                return `🤖 [Smart Web Search - ${title}]:\n\n${extract.substring(0, 1800)}`;
            }
        }
        return null;
    } catch(e) { return null; }
}

async function askSmartAI(queryText) {
    if(queryText.toLowerCase().includes("что такое") || queryText.toLowerCase().includes("кто") || queryText.toLowerCase().includes("найди")) {
        let webAnswer = await searchWebFallback(queryText);
        if(webAnswer) return webAnswer;
    }

    try {
        let url = `https://text.pollinations.ai/${encodeURIComponent(queryText)}?system=${encodeURIComponent(currentSystemPrompt)}`;
        let res = await fetch(url);
        let text = await res.text();
        
        if (text.includes('"error"') || text.includes('Queue full') || text.includes('status":429')) {
            throw new Error("Занят"); 
        }

        if(text && text.length > 5 && !text.toLowerCase().includes("not found")) {
            return text.trim();
        }
    } catch (e) {
        let backup = await searchWebFallback(queryText);
        if(backup) return backup;
    }

    return "❌ Извините, сеть сейчас перегружена. Пожалуйста, попробуйте отправить запрос еще раз через секунду.";
}
