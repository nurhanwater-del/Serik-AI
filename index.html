function speakText(text) {
    if (!voiceEnabled) return;
    window.speechSynthesis.cancel(); 

    let cleanText = text.replace(/[\p{Emoji_Presentation}\p{Extended_Pictographic}рЯУЛвЬЕвЪЫпЄПрЯУЬрЯФ•рЯТїрЯЫЛпЄПрЯ§ЦрЯС®вАНрЯПЂрЯШОвЬ®]/gu, '');
    cleanText = cleanText.replace(/[#*`~_\-()]/g, ' ');
    
    let speech = new SpeechSynthesisUtterance(cleanText);
    speech.lang = /[”Щ“У“Ы“£”©“±“ѓ“ї—Ц–Ж”Ш“Т“Ъ“Ґ”®“∞“Ѓ“Ї]/g.test(text) ? 'kk-KZ' : 'ru-RU';
    
    let voices = window.speechSynthesis.getVoices();
    let preferredVoice = voices.find(v => v.lang.startsWith(speech.lang.split('-')[0]));
    if (preferredVoice) speech.voice = preferredVoice;

    speech.pitch = 1.0; 
    speech.rate = 1.05; 
    window.speechSynthesis.speak(speech);
}

function add(text, type, instant = false){
    let div = document.createElement("div");
    div.className = "msg " + type;
    
    let textSpan = document.createElement("span");
    div.appendChild(textSpan);

    if (type === "ai") {
        let copyBtn = document.createElement("button");
        copyBtn.innerText = "рЯУЛ";
        copyBtn.className = "copy-btn";
        copyBtn.onclick = function() {
            navigator.clipboard.writeText(text);
            copyBtn.innerText = "вЬЕ";
            setTimeout(() => { copyBtn.innerText = "рЯУЛ"; }, 2000);
        };
        div.appendChild(copyBtn);
